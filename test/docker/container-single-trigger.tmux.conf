# Container tmux config — SINGLE-trigger variant (the proposed cleanup).
#
# Same as container.tmux.conf EXCEPT the two changes the chezmoi cleanup makes:
#   1. @continuum-restore 'off' — continuum's own auto-restore no longer fires.
#   2. the boot-guard no longer requires @continuum-restore = on; it fires
#      restore-wrapper.sh gated only on @continuum-boot-started being unset.
# Net: restore-wrapper.sh becomes the SOLE restore path → restore.sh runs once
# → @resurrect-hook-pre-restore-pane-processes fires exactly once. This proves
# the cleanup still restores everything (claude pre-fills AND nvim), just once.
#
# It also proves the trap: if you set @continuum-restore off WITHOUT rewiring
# the guard, the original guard's `= on` check would make BOTH triggers go
# silent and NOTHING would restore. This config is the correct rewire.

set -g default-shell /usr/bin/zsh
set -g history-limit 20000
set -g focus-events on
set -g status off
set -g base-index 1
set -g pane-base-index 1

run-shell 'tmux set -g @resurrect-dir "$CLAUDE_RESCUE_DATA_HOME/resurrect"'
set -g @resurrect-capture-pane-contents 'off'
# Production wiring verbatim (bare `nvim`); `mise activate zsh` in the image
# keeps nvim's argv bare so this matches — see container.tmux.conf.
set -g @resurrect-processes '~caffeinate "claude->claude-rescue-resume *" nvim "vim *"'
set -g @resurrect-strategy-nvim 'session'

# CLEANUP CHANGE 1: continuum auto-restore OFF (auto-SAVE is a separate setting
# and unaffected; we drive saves manually in the harness anyway).
set -g @continuum-restore 'off'

source-file -q "/opt/claude-rescue/tmux/rescue.tmux.conf"

run-shell "$HOME/.config/tmux/plugins/tmux-resurrect/resurrect.tmux"
run-shell "$HOME/.config/tmux/plugins/tmux-continuum/continuum.tmux"

set -g @resurrect-save-script-path "/opt/claude-rescue/scripts/save-guarded.sh"

# CLEANUP CHANGE 2: boot-guard rewired — fire restore-wrapper.sh as the SOLE
# restore path, gated only on not-already-started. No dependence on
# @continuum-restore, so turning continuum's restore off doesn't silence this.
if-shell '[ -z "$(tmux show -gqv @continuum-boot-started)" ]' \
  'set -g @continuum-boot-started 1 ; run-shell "$HOME/.config/tmux/scripts/restore-wrapper.sh"'

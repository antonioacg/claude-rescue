# Container tmux config — mirrors the deployed dot_tmux.conf RESTORE wiring so a
# real boot fires BOTH restore triggers (the 2026-06-05 dual-trigger):
#   (1) tmux-continuum's own auto-restore (runs @resurrect-restore-script-path,
#       which resurrect.tmux sets to the plugin's restore.sh)
#   (2) the boot-guard that runs restore-wrapper.sh (which also runs restore.sh)
# Both fire @resurrect-hook-pre-restore-pane-processes -> claude-rescue-log
# resurrect-restore -> two concurrent post-restore subshells. The idempotency
# guard must make each pane's pre-fill exactly-once.
#
# Paths assume the runtime mounts in harness.sh:
#   /opt/claude-rescue            claude-rescue working tree (bin on PATH)
#   /root/.config/tmux/plugins    host tmux-resurrect + tmux-continuum
#   /root/.config/tmux/scripts    host restore-wrapper.sh
#   /root/.config/zsh/aliases.zsh host cl/clr aliases

set -g default-shell /usr/bin/zsh
set -g history-limit 20000
set -g focus-events on
set -g status off
set -g base-index 1
set -g pane-base-index 1

# Per-test resurrect dir (from env, set by harness.sh).
run-shell 'tmux set -g @resurrect-dir "$CLAUDE_RESCUE_DATA_HOME/resurrect"'
set -g @resurrect-capture-pane-contents 'off'
set -g @resurrect-processes '~caffeinate "claude->claude-rescue-resume *" nvim "vim *"'
set -g @resurrect-strategy-nvim 'session'

# continuum: auto-restore ON (the first trigger). No save-interval status hook
# fires because status is off — we drive saves manually in the harness.
set -g @continuum-restore 'on'

# Rescue hooks FIRST, so they're registered before any restore.sh runs.
source-file -q "/opt/claude-rescue/tmux/rescue.tmux.conf"

# Load the plugins as real shell entrypoints (NOT source-file). resurrect.tmux's
# main() sets @resurrect-restore-script-path (-> its restore.sh); continuum.tmux's
# main() arms the background auto-restore when the server just started.
run-shell "$HOME/.config/tmux/plugins/tmux-resurrect/resurrect.tmux"
run-shell "$HOME/.config/tmux/plugins/tmux-continuum/continuum.tmux"

# resurrect.tmux resets @resurrect-save-script-path to its own save.sh; re-point
# it at our lock-aware wrapper, exactly like dot_tmux.conf does post-tpm.
set -g @resurrect-save-script-path "/opt/claude-rescue/scripts/save-guarded.sh"

# Boot guard (the second trigger) — mirrors dot_tmux.conf. Fires restore-wrapper
# once per boot. Combined with continuum's auto-restore above => dual trigger.
if-shell '[ "$(tmux show -gqv @continuum-restore)" = "on" ] && [ -z "$(tmux show -gqv @continuum-boot-started)" ]' \
  'set -g @continuum-boot-started 1 ; run-shell "$HOME/.config/tmux/scripts/restore-wrapper.sh"'

# Minimal tmux config for the isolated test server (tmux -L claude-rescue-test).
# Sourced via -f by test/run-isolated.sh.

set -g default-terminal "screen-256color"
set -g history-limit 50000
set -g focus-events on
set -g status off

# Use a test-specific resurrect dir to avoid touching the user's real state.
set -g @resurrect-dir "$CLAUDE_RESCUE_HOME/resurrect"
set -g @resurrect-capture-pane-contents 'on'

# Source the rescue hooks (defines @resurrect-hook-post-save-layout etc.).
# CLAUDE_RESCUE_REPO is set by run-isolated.sh just for finding this file;
# the rescue config itself only uses bare command names (PATH-based).
source-file -q "$CLAUDE_RESCUE_REPO/tmux/rescue.tmux.conf"

# Load tmux-resurrect from the user's plugin install (read-only — we do not
# write into ~/.config/tmux/plugins from tests).
source-file -q "$HOME/.config/tmux/plugins/tmux-resurrect/resurrect.tmux"


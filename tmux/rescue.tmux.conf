# claude-rescue tmux hooks. Sourced from ~/.tmux.conf.
#
# Requires `claude-rescue-log` to be on PATH (install.sh symlinks it into
# ~/.local/bin/). All hook commands are PATH-resolved at execution time, so no
# environment variables need to be set for tmux's run-shell to find anything.

# --- Resurrect extensions (preserve @claude-window-id across save/restore) ---

set -g @resurrect-hook-post-save-layout 'claude-rescue-log resurrect-save "$1"'
set -g @resurrect-hook-post-restore-all 'claude-rescue-log resurrect-restore'

# --- Event hooks (writer is invoked via run-shell -b for non-blocking dispatch) ---

set-hook -g pane-title-changed 'run-shell -b "claude-rescue-log title \"#{pane_id}\" \"#{pane_title}\" 2>>\"${CLAUDE_RESCUE_HOME:-$HOME/.claude-rescue}/rescue-log.err\""'
set-hook -g pane-died          'run-shell -b "claude-rescue-log pane-died \"#{pane_id}\" 2>>\"${CLAUDE_RESCUE_HOME:-$HOME/.claude-rescue}/rescue-log.err\""'
set-hook -g client-detached    'run-shell -b "claude-rescue-log client-detached 2>>\"${CLAUDE_RESCUE_HOME:-$HOME/.claude-rescue}/rescue-log.err\""'

# --- SIGSTOP focus hooks (uncomment to enable) ---

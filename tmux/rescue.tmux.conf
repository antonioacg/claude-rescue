# claude-rescue tmux hooks. Sourced from ~/.tmux.conf.
#
# Requires `claude-rescue-log` to be on PATH (install.sh symlinks it into
# ~/.local/bin/). All hook commands are PATH-resolved at execution time.
#
# Title tracking and pane-disappearance detection happen inside the
# resurrect post-save-layout hook (runs every continuum-save-interval).
# This avoids tmux 3.x's pane-scoped hook quirks (pane-title-changed and
# pane-died don't register at server-global scope and don't propagate to
# newly-created panes), and keeps live and backfill on the same code path.

# --- Resurrect extensions ---------------------------------------------------
# post-save-layout: writes the @claude-window-id and @claude-pane-id sidecars
#   AND samples per-pane state to emit title transitions / pane-died events.
# pre-restore-all: creates `.restoring` lock in the resurrect-dir at the
#   earliest restore checkpoint. save-guarded.sh (wired via
#   @resurrect-save-script-path) bails on any save while the lock exists.
#   Without this, tmux-continuum's status-bar save fires mid-restore,
#   captures partial state, and rotates `last` to the broken snapshot.
# pre-restore-pane-processes: re-applies @claude-window-id and @claude-pane-id
#   from the sidecar BEFORE tmux-resurrect send-keys's any saved pane process
#   (e.g. claude-rescue-resume) into restored panes. Using post-restore-all
#   races: send-keys is already in flight, so a wrapper that reads the pane's
#   options can see them un-set and fall back to a fresh session.
# post-restore-all: removes the `.restoring` lock so saves resume normally.
set -g @resurrect-hook-post-save-layout            'claude-rescue-log resurrect-save "$1"'
set -g @resurrect-hook-pre-restore-all             'claude-rescue-log resurrect-pre-restore-all'
set -g @resurrect-hook-pre-restore-pane-processes  'claude-rescue-log resurrect-restore'
set -g @resurrect-hook-post-restore-all            'claude-rescue-log resurrect-post-restore-all'

# NOTE: @resurrect-save-script-path is also part of this pipeline (routes
# continuum-driven saves through scripts/save-guarded.sh). It's set in
# chezmoi's dot_tmux.conf AFTER `run tpm`, because tmux-resurrect's plugin
# entrypoint (resurrect.tmux's main → set_script_path_options) resets that
# option to the plugin's own save.sh when tpm loads it. Setting it here
# would be overridden; setting it post-tpm in tmux.conf sticks.

# --- Server-global hook (the only pane/client hook that works -g) ----------
set-hook -g client-detached 'run-shell -b "claude-rescue-log client-detached"'

# --- Hibernation: focus-driven two-stage pane suspension --------------------
# pane-focus-out: arm a timer that, after CLAUDE_RESCUE_SOFT_DELAY (default
#   3600s = 60min) of focus-out, captures the scrollback and sends Ctrl+Z to
#   suspend claude via terminal job control. After CLAUDE_RESCUE_HARD_DELAY
#   (default 86400s = 24h) total, escalates: fg + `/exit` (with SIGTERM →
#   SIGKILL fallback if claude doesn't exit within ~3s) to terminate claude
#   entirely, then send-keys `clr <session_id>` to pre-fill the prompt.
#   Capture stays on disk for `claude-rescue print`. Defers if the busy
#   marker is set by claude's hooks.
# pane-focus-in: for soft, cancel pending arm and `fg<Enter>` the suspended
#   claude job. For hard, leave the in-flight arm subshell alone (it's
#   finishing the `clr <sid>` pre-fill); marker survives until the user
#   resumes (cmd_session_start cleans it) or the pane dies.
# Both hooks are pane-scoped events but register fine at -g on tmux 3.6+.
# The arm path is a no-op on panes without @claude-pane-id (never ran claude),
# so wiring this globally doesn't burn timers on plain shell panes.
set-hook -g pane-focus-out 'run-shell -b "claude-rescue-log hibernate-arm #{pane_id} #{pane_pid}"'
set-hook -g pane-focus-in  'run-shell -b "claude-rescue-log hibernate-resume #{pane_id}"'

# client-attached / client-session-changed: sweep all panes and arm any
# backgrounded claude pane that isn't already armed. pane-focus-out only
# fires for the *currently focused* pane transitioning away, so panes that
# are inactive-in-window — or that the user simply never visited since
# attach — never get a countdown started by focus events alone. The sweep
# is idempotent (per-pane arm.pid check skips already-armed) and cheap
# (one subshell per attach / session change).
set-hook -g client-attached         'run-shell -b "claude-rescue-log arm-sweep"'
set-hook -g client-session-changed  'run-shell -b "claude-rescue-log arm-sweep"'

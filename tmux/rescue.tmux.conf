# claude-rescue tmux hooks. Sourced from ~/.tmux.conf.
#
# Requires `claude-rescue-log` to be on PATH (install.sh symlinks it into
# ~/.local/bin/). All hook commands are PATH-resolved at execution time.
#
# Errors from claude-rescue-log are written internally to
# $CLAUDE_RESCUE_HOME/rescue-log.err (default: ~/.claude-rescue/rescue-log.err).
# tmux's run-shell -b swallows stderr, so we don't try to redirect here.

# --- Resurrect extensions (preserve @claude-window-id across save/restore) ---

set -g @resurrect-hook-post-save-layout 'claude-rescue-log resurrect-save "$1"'
set -g @resurrect-hook-post-restore-all 'claude-rescue-log resurrect-restore'

# --- Event hooks ------------------------------------------------------------

set-hook -g pane-title-changed 'run-shell -b "claude-rescue-log title \"#{pane_id}\" \"#{pane_title}\""'
set-hook -g pane-died          'run-shell -b "claude-rescue-log pane-died \"#{pane_id}\""'
set-hook -g client-detached    'run-shell -b "claude-rescue-log client-detached"'

# --- SIGSTOP focus hooks (uncomment to enable) ------------------------------
# set-hook -g pane-focus-out 'run-shell -b "claude-rescue-log sigstop-arm \"#{pane_id}\" \"#{pane_pid}\""'
# set-hook -g pane-focus-in  'run-shell -b "claude-rescue-log sigstop-resume \"#{pane_id}\""'
